name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  offline-gates:
    name: Offline release gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test runner
        run: python -m pip install --upgrade pytest

      - name: Run unit and contract tests
        run: python -m pytest -q

      - name: Verify skill/channel contracts
        run: python tools/verify_channel_capability.py --quick

      - name: Compile bundled Python tools
        run: python -m compileall -q tools codex/ai-berkshire/scripts/tools

      - name: Run release smoke
        run: python tools/release_smoke.py

      - name: Check whitespace and conflict markers
        run: git diff --check
